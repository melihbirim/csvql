name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Release Binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: csvql-linux-x86_64
          - os: macos-latest
            target: x86_64-macos
            artifact: csvql-macos-x86_64
          - os: macos-latest
            target: aarch64-macos
            artifact: csvql-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast

      - name: Prepare artifact
        run: |
          mkdir -p release
          cp zig-out/bin/csvql release/${{ matrix.artifact }}
          cd release
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/${{ matrix.artifact }}.tar.gz
          draft: false
          prerelease: false

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Wait for release assets to be available
        run: sleep 15

      - name: Download release assets and compute SHA256
        id: hashes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE="https://github.com/melihbirim/csvql/releases/download/v${VERSION}"

          curl -L -o macos-aarch64.tar.gz "${BASE}/csvql-macos-aarch64.tar.gz"
          curl -L -o macos-x86_64.tar.gz  "${BASE}/csvql-macos-x86_64.tar.gz"
          curl -L -o linux-x86_64.tar.gz  "${BASE}/csvql-linux-x86_64.tar.gz"

          echo "sha_macos_arm=$(sha256sum macos-aarch64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "sha_macos_x86=$(sha256sum macos-x86_64.tar.gz  | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "sha_linux_x86=$(sha256sum linux-x86_64.tar.gz  | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const version  = "${{ steps.version.outputs.version }}";
            const shaArm   = "${{ steps.hashes.outputs.sha_macos_arm }}";
            const shaX86   = "${{ steps.hashes.outputs.sha_macos_x86 }}";
            const shaLinux = "${{ steps.hashes.outputs.sha_linux_x86 }}";
            const base     = `https://github.com/melihbirim/csvql/releases/download/v${version}`;

            const formula = `class Csvql < Formula
              desc "Ultra-fast SQL query engine for CSV files with SIMD parsing and parallel execution"
              homepage "https://github.com/melihbirim/csvql"
              version "${version}"
              license "MIT"

              on_macos do
                on_arm do
                  url "${base}/csvql-macos-aarch64.tar.gz"
                  sha256 "${shaArm}"
                end
                on_intel do
                  url "${base}/csvql-macos-x86_64.tar.gz"
                  sha256 "${shaX86}"
                end
              end

              on_linux do
                on_intel do
                  url "${base}/csvql-linux-x86_64.tar.gz"
                  sha256 "${shaLinux}"
                end
              end

              def install
                bin.install Dir["csvql-*"].first => "csvql"
              end

              test do
                (testpath/"test.csv").write("name,age\\nAlice,30\\nBob,25\\n")
                output = shell_output("#{bin}/csvql \\"SELECT name FROM 'test.csv' WHERE age > 26\\"")
                assert_match "Alice", output
              end
            end
            `;

            // Get current file SHA (needed for update)
            const { data: current } = await github.rest.repos.getContent({
              owner: "melihbirim",
              repo:  "homebrew-csvql",
              path:  "Formula/csvql.rb",
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner:   "melihbirim",
              repo:    "homebrew-csvql",
              path:    "Formula/csvql.rb",
              message: `chore: update formula to v${version}`,
              content: Buffer.from(formula).toString("base64"),
              sha:     current.sha,
            });

  publish-pypi:
    name: Publish Python wheels to PyPI
    needs: release
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            plat: manylinux_2_17_x86_64
          - os: macos-latest
            arch: x86_64
            plat: macosx_12_0_x86_64
          - os: macos-latest
            arch: arm64
            plat: macosx_12_0_arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Zig shared library
        run: zig build -Doptimize=ReleaseFast

      - name: Copy library into package
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            cp zig-out/lib/libcsvql.dylib python/csvql/libcsvql.dylib
          else
            cp zig-out/lib/libcsvql.so python/csvql/libcsvql.so
          fi

      - name: Build wheel
        working-directory: python
        run: |
          pip install --upgrade setuptools build wheel
          # Set version from git tag (strips leading 'v')
          TAG="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = .*/version = \"$TAG\"/" pyproject.toml
          python -m build --wheel --no-isolation
          # Rename wheel to correct platform tag
          cd dist
          for f in *.whl; do
            mv "$f" "${f/py3-none-any/py3-none-${{ matrix.plat }}}" 2>/dev/null || true
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.plat }}
          path: python/dist/*.whl

  pypi-upload:
    name: Upload all wheels to PyPI
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/csvql-query

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
