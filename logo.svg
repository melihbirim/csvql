<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <!-- Background gradient: dark charcoal -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>

    <!-- Zig orange accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7a41d"/>
      <stop offset="100%" style="stop-color:#ff6f3c"/>
    </linearGradient>

    <!-- Text gradient: warm white -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>

    <!-- Glow filter for icon -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to rounded rect -->
    <clipPath id="clip">
      <rect width="420" height="100" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="420" height="100" rx="14" fill="url(#bg)"/>

  <!-- Subtle grid lines (CSV feel) -->
  <g clip-path="url(#clip)" opacity="0.04">
    <line x1="0" y1="25" x2="420" y2="25" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="50" x2="420" y2="50" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="75" x2="420" y2="75" stroke="#ffffff" stroke-width="1"/>
    <line x1="105" y1="0" x2="105" y2="100" stroke="#ffffff" stroke-width="1"/>
    <line x1="210" y1="0" x2="210" y2="100" stroke="#ffffff" stroke-width="1"/>
    <line x1="315" y1="0" x2="315" y2="100" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Wordmark: csvql as one word, csv=white, ql=orange -->
  <text
        font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
        font-size="56"
        font-weight="700"
        letter-spacing="-2"
        x="26" y="66">
    <tspan fill="url(#textGrad)" opacity="0.95">csv</tspan><tspan fill="url(#accentGrad)">ql</tspan>
  </text>

  <!-- Tagline -->
  <text x="27" y="85"
        font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
        font-size="10.5"
        font-weight="400"
        fill="#7a8ba0"
        letter-spacing="2.2">SQL queries on CSV files</text>

  <!-- Accent underline bar beneath wordmark -->
  <rect x="26" y="71" width="220" height="2.5" rx="1.25" fill="url(#accentGrad)" opacity="0.55"/>

  <!-- Speed badge -->
  <g transform="translate(310, 28)">
    <rect width="86" height="24" rx="12" fill="url(#accentGrad)" opacity="0.13"/>
    <rect width="86" height="24" rx="12" fill="none" stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.55"/>
    <text x="43" y="16"
          font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
          font-size="11"
          font-weight="600"
          fill="#f7a41d"
          text-anchor="middle"
          letter-spacing="0.5">⚡ &gt;2× DuckDB</text>
  </g>

  <!-- Built in Zig pill -->
  <g transform="translate(310, 62)">
    <rect width="86" height="22" rx="11" fill="#ffffff" opacity="0.05"/>
    <text x="43" y="15"
          font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
          font-size="10"
          font-weight="400"
          fill="#7a8ba0"
          text-anchor="middle"
          letter-spacing="1">built in Zig</text>
  </g>
</svg>
